## ─── Configuração Nginx para PeopleHub ───────────────────────────────────────
## Salve em: /etc/nginx/sites-available/peoplehub
## Ative com: sudo ln -s /etc/nginx/sites-available/peoplehub /etc/nginx/sites-enabled/
## Reinicie: sudo systemctl restart nginx

server {
    listen 80;
    server_name seu-dominio.com.br;  ## ← Substitua pelo seu domínio ou IP

    ## Redirecionar HTTP → HTTPS (descomente quando tiver SSL)
    ## return 301 https://$server_name$request_uri;

    ## Tamanho máximo de upload
    client_max_body_size 20M;

    ## Proxy para o Flask/Gunicorn
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    ## Cache para arquivos estáticos
    location /css/ {
        proxy_pass http://127.0.0.1:5000/css/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /js/ {
        proxy_pass http://127.0.0.1:5000/js/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    ## Logs
    access_log /var/log/nginx/peoplehub_access.log;
    error_log  /var/log/nginx/peoplehub_error.log;
}

